# Rate limiting — 10 requests/second per IP, burst of 20
limit_req_zone $binary_remote_addr zone=pool:10m rate=10r/s;

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name phillphamserver.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/phillphamserver.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/phillphamserver.duckdns.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options        SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy        strict-origin-when-cross-origin;

    # HTTP Basic Auth — shared password for all pool users
    auth_basic           "NHL Playoff Pool";
    auth_basic_user_file /etc/nginx/.htpasswd;

    limit_req zone=pool burst=20 nodelay;

    location /pool1/ {
        proxy_pass         http://shiny_pool1:3838/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 20d;
        proxy_buffering    off;
    }

    location /pool2/ {
        proxy_pass         http://shiny_pool2:3838/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 20d;
        proxy_buffering    off;
    }

    # Redirect bare root to pool1
    location = / {
        return 302 /pool1/;
    }
}
